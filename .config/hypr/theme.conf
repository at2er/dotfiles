source=catppuccin/themes/mocha.conf

env = WMENU_BG,000000
env = WMENU_FG,$textAlpha
env = WMENU_PROMPT_BG,$mauveAlpha
env = WMENU_PROMPT_FG,$baseAlpha
env = WMENU_SEL_BG,$mauveAlpha
env = WMENU_SEL_FG,$baseAlpha

general {
	border_size = 1
	gaps_in  = 5
	gaps_out = 5
	col.inactive_border = $base
	col.active_border = $maroon
}

decoration {
	rounding = 5
	rounding_power = 2
	inactive_opacity = 0.8
	dim_inactive = false
	blur {
		enabled = false
	}
}

group {
	col.border_active = $pink
	col.border_inactive = $base
	groupbar {
		rounding = 0
		gradients = false
		gradient_rounding = 0
		text_color = $pink
		col.active = $pink
		col.inactive = $base
		gaps_in  = 0
		gaps_out = 2
	}
}

misc {
	animate_mouse_windowdragging = true
}
